configs:
  dcgm_metrics:
    content: |
      # DCGM Metrics - Standard + Profiling
      DCGM_FI_DEV_SM_CLOCK,          gauge, SM clock frequency (in MHz).
      DCGM_FI_DEV_MEM_CLOCK,         gauge, Memory clock frequency (in MHz).
      DCGM_FI_DEV_MEMORY_TEMP,       gauge, Memory temperature (in C).
      DCGM_FI_DEV_GPU_TEMP,          gauge, GPU temperature (in C).
      DCGM_FI_DEV_POWER_USAGE,       gauge, Power draw (in W).
      DCGM_FI_DEV_TOTAL_ENERGY_CONSUMPTION, counter, Total energy consumption since boot (in mJ).
      DCGM_FI_DEV_PCIE_TX_THROUGHPUT, counter, PCIe TX bytes per second.
      DCGM_FI_DEV_PCIE_RX_THROUGHPUT, counter, PCIe RX bytes per second.
      DCGM_FI_DEV_GPU_UTIL,          gauge, GPU utilization (in %).
      DCGM_FI_DEV_MEM_COPY_UTIL,     gauge, Memory utilization (in %).
      DCGM_FI_DEV_ENC_UTIL,          gauge, Encoder utilization (in %).
      DCGM_FI_DEV_DEC_UTIL,          gauge, Decoder utilization (in %).
      DCGM_FI_DEV_FB_FREE,           gauge, Framebuffer memory free (in MiB).
      DCGM_FI_DEV_FB_USED,           gauge, Framebuffer memory used (in MiB).
      DCGM_FI_PROF_GR_ENGINE_ACTIVE,   gauge, Ratio of time the graphics engine is active.
      DCGM_FI_PROF_SM_ACTIVE,          gauge, Ratio of cycles at least one warp is active on a SM.
      DCGM_FI_PROF_SM_OCCUPANCY,       gauge, Ratio of number of warps resident on a SM.
      DCGM_FI_PROF_PIPE_TENSOR_ACTIVE, gauge, Ratio of cycles the tensor (HMMA) pipe is active.
      DCGM_FI_PROF_DRAM_ACTIVE,        gauge, Ratio of cycles the device memory interface is active.
      DCGM_FI_PROF_PIPE_FP64_ACTIVE,   gauge, Ratio of cycles the fp64 pipe is active.
      DCGM_FI_PROF_PIPE_FP32_ACTIVE,   gauge, Ratio of cycles the fp32 pipe is active.
      DCGM_FI_PROF_PIPE_FP16_ACTIVE,   gauge, Ratio of cycles the fp16 pipe is active.
      DCGM_FI_PROF_PCIE_TX_BYTES,      counter, PCIe transmit bytes.
      DCGM_FI_PROF_PCIE_RX_BYTES,      counter, PCIe receive bytes.
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: "prometheus"
          static_configs:
            - targets: ["localhost:9090"]
        - job_name: "dcgm-exporter"
          scrape_interval: 5s
          static_configs:
            - targets: ["dcgm-exporter:9400"]
        - job_name: "node-exporter"
          static_configs:
            - targets: ["node-exporter:9100"]
        - job_name: "cadvisor"
          static_configs:
            - targets: ["cadvisor:8080"]

  grafana_datasource:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: false

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - monitoring
      - proxy
    labels:
      traefik.enable: "true"
      traefik.http.routers.prometheus.rule: "Host(`prometheus.${DOMAIN}`)"
      traefik.http.services.prometheus.loadbalancer.server.port: "9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/prometheus.yml
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
      - proxy
    depends_on:
      - prometheus
    labels:
      traefik.enable: "true"
      traefik.http.routers.grafana.rule: "Host(`grafana.${DOMAIN}`)"
      traefik.http.services.grafana.loadbalancer.server.port: "3000"

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.8-3.6.0-ubuntu22.04
    container_name: dcgm-exporter
    restart: unless-stopped
    environment:
      - DCGM_EXPORTER_COLLECTORS=/etc/dcgm-exporter/dcgm-metrics.csv
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    cap_add:
      - SYS_ADMIN
    configs:
      - source: dcgm_metrics
        target: /etc/dcgm-exporter/dcgm-metrics.csv
    ports:
      - "9400:9400"
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    networks:
      - monitoring

volumes:
  prometheus-data:
  grafana-data:

networks:
  monitoring:
    driver: bridge
  proxy:
    external: true
