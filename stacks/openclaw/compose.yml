services:
  openclaw:
    build:
      context: ../../images/openclaw
    container_name: openclaw
    restart: unless-stopped

    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EXA_API_KEY: ${EXA_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_BOT_TOKEN_DAN: ${DISCORD_BOT_TOKEN_DAN}
      DISCORD_BOT_TOKEN_DECLAN: ${DISCORD_BOT_TOKEN_DECLAN}
      DISCORD_BOT_TOKEN_EAMON: ${DISCORD_BOT_TOKEN_EAMON}
      DISCORD_BOT_TOKEN_MAEVE: ${DISCORD_BOT_TOKEN_MAEVE}
      DISCORD_BOT_TOKEN_RONAN: ${DISCORD_BOT_TOKEN_RONAN}
      TRELLO_API_KEY: ${TRELLO_API_KEY}
      TRELLO_TOKEN: ${TRELLO_TOKEN}
      GH_TOKEN: ${GH_TOKEN}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      NEXTCLOUD_AGENTS_PASSWORD: ${NEXTCLOUD_AGENTS_PASSWORD}
      OLLAMA_BASE_URL: http://ollama:11434
      OPENCLAW_BIND: lan
      
    volumes:
      - /srv/openclaw:/home/node/.openclaw

    networks:
      - proxy

    labels:
      traefik.enable: "true"
      traefik.http.routers.openclaw.rule: "Host(`openclaw.${DOMAIN}`)"
      traefik.http.routers.openclaw.entrypoints: "websecure"
      traefik.http.routers.openclaw.tls: "true"
      traefik.http.services.openclaw.loadbalancer.server.port: "18789"

networks:
  proxy:
    external: true
