services:
  nextcloud:
    image: nextcloud:29-apache
    container_name: nextcloud
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${NEXTCLOUD_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: cloud.${DOMAIN}
      PHP_MEMORY_LIMIT: ${NEXTCLOUD_PHP_MEMORY_LIMIT:-512M}
      PHP_UPLOAD_LIMIT: ${NEXTCLOUD_PHP_UPLOAD_LIMIT:-512M}
    volumes:
      - /srv/nextcloud/data:/var/www/html
      - /srv/nextcloud/apps:/var/www/html/custom_apps
      - /srv/nextcloud/config:/var/www/html/config
    extra_hosts:
      - "office.camp-fai:192.168.1.214"
    networks:
      - proxy
    labels:
      traefik.enable: "true"
      traefik.http.routers.nextcloud.rule: "Host(`cloud.${DOMAIN}`)"
      traefik.http.routers.nextcloud.entrypoints: "websecure"
      traefik.http.routers.nextcloud.tls: "true"
      traefik.http.services.nextcloud.loadbalancer.server.port: "80"

  onlyoffice:
    image: onlyoffice/documentserver:8.0
    container_name: onlyoffice
    restart: unless-stopped
    extra_hosts:
      - "cloud.camp-fai:192.168.1.214"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    volumes:
      - /srv/onlyoffice/data:/var/www/onlyoffice/Data
      - /srv/onlyoffice/logs:/var/log/onlyoffice
      - /srv/onlyoffice/lib:/var/lib/onlyoffice
    networks:
      - proxy
    labels:
      traefik.enable: "true"
      traefik.http.routers.onlyoffice.rule: "Host(`office.${DOMAIN}`)"
      traefik.http.routers.onlyoffice.entrypoints: "websecure"
      traefik.http.routers.onlyoffice.tls: "true"
      traefik.http.services.onlyoffice.loadbalancer.server.port: "80"

networks:
  proxy:
    external: true
