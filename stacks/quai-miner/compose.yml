version: "3.9"

services:
  rigel:
    image: ghcr.io/rigelminer/rigel:1.23.0
    restart: unless-stopped

    runtime: nvidia

    environment:
      ALGO: ${ALGO}
      POOL: ${POOL}
      WALLET: ${WALLET}
      WORKER: ${WORKER}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    command: >
      rigel
      -a ${ALGO}
      -o ${POOL}
      -u ${WALLET}
      -w ${WORKER}