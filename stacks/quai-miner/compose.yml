version: "3.9"

services:
  rigel:
    build:
      context: ../../images/rigel

    restart: unless-stopped
    runtime: nvidia

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    command: >
      -a ${ALGO}
      -o ${POOL}
      -u ${WALLET}
      -w ${WORKER}