version: "3.9"

services:
  rigel:
    image: ghcr.io/rigelminer/rigel:latest
    restart: unless-stopped

    runtime: nvidia

    env_file:
      - /opt/stacks/quai-miner/.env

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    command: >
      rigel
      -a ${ALGO}
      -o ${POOL}
      -u ${WALLET}
      -w ${WORKER}

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]