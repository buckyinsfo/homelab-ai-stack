services:
  hermes:
    build:
      context: ../../images/hermes
    container_name: hermes
    restart: unless-stopped
    command: ["gateway", "run"]

    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}

    volumes:
      - /srv/hermes:/opt/data

    networks:
      - proxy

  hermes-dashboard:
    build:
      context: ../../images/hermes
    container_name: hermes-dashboard
    restart: unless-stopped
    command: ["dashboard", "--no-open", "--host", "0.0.0.0", "--insecure"]

    volumes:
      - /srv/hermes:/opt/data

    networks:
      - proxy

    labels:
      traefik.enable: "true"
      traefik.http.routers.hermes-dashboard.rule: "Host(`hermes.${DOMAIN}`)"
      traefik.http.routers.hermes-dashboard.entrypoints: "websecure"
      traefik.http.routers.hermes-dashboard.tls: "true"
      traefik.http.routers.hermes-dashboard.middlewares: "hermes-auth@docker"
      traefik.http.services.hermes-dashboard.loadbalancer.server.port: "9119"
      traefik.http.middlewares.hermes-auth.basicauth.users: "${HERMES_AUTH_USERS}"

networks:
  proxy:
    external: true
