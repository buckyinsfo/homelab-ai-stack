services:
  hermes:
    build:
      context: ../../images/hermes
    container_name: hermes
    restart: unless-stopped
    command: ["gateway", "run"]

    environment:
      DOMAIN: ${DOMAIN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      HERMES_AUTH_USERS: ${HERMES_AUTH_USERS}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      NEXTCLOUD_AGENTS_PASSWORD: ${NEXTCLOUD_AGENTS_PASSWORD}
      CUTTHROAT_AGENT_API_KEY: ${CUTTHROAT_AGENT_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}

    volumes:
      - /srv/hermes:/opt/data

    networks:
      - proxy

  hermes-dashboard:
    build:
      context: ../../images/hermes
    container_name: hermes-dashboard
    restart: unless-stopped
    command: ["dashboard", "--no-open", "--host", "0.0.0.0", "--insecure"]

    volumes:
      - /srv/hermes:/opt/data

    networks:
      - proxy

    labels:
      traefik.enable: "true"
      traefik.http.routers.hermes-dashboard.rule: "Host(`hermes.${DOMAIN}`)"
      traefik.http.routers.hermes-dashboard.entrypoints: "websecure"
      traefik.http.routers.hermes-dashboard.tls: "true"
      traefik.http.services.hermes-dashboard.loadbalancer.server.port: "9119"

networks:
  proxy:
    external: true
